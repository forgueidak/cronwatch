# cronwatch configuration example
# Copy to cronwatch/config.yaml and customise.

# Directory where job logs are written
log_dir: ~/.cronwatch/logs

# Directory where job history (JSON lines) is stored
history_dir: ~/.cronwatch/history

# Directory used to persist alert throttle state
alert_state_dir: ~/.cronwatch/alert_state

# How long (seconds) to suppress repeated alerts for the same failing job.
# Default: 3600 (1 hour). Set to 0 to disable throttling.
alert_throttle_seconds: 3600

# Slack integration (optional)
slack:
  enabled: false
  webhook_url: https://hooks.slack.com/services/XXX/YYY/ZZZ
  channel: "#ops-alerts"
  username: cronwatch
  # notify even when the job succeeds
  notify_on_success: false

# Email integration (optional)
email:
  enabled: false
  smtp_host: smtp.example.com
  smtp_port: 587
  smtp_user: alerts@example.com
  smtp_password: secret
  from_addr: alerts@example.com
  to_addrs:
    - oncall@example.com
  use_tls: true
  notify_on_success: false

# Jobs watched via `cronwatch watch`
jobs:
  - name: nightly-backup
    command: /usr/local/bin/backup.sh
    schedule: "0 2 * * *"
    timeout: 1800
  - name: hourly-sync
    command: /usr/local/bin/sync.sh
    schedule: "@hourly"
    timeout: 300
