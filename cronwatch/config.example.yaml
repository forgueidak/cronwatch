# cronwatch configuration example
# Copy to config.yaml and adjust as needed.

# --- Job definitions -------------------------------------------------------
jobs:
  - name: backup-db
    command: "/usr/local/bin/backup.sh"
    schedule: "0 2 * * *"          # daily at 02:00  (or @daily)
    timeout: 300                   # seconds; omit for no timeout

  - name: send-report
    command: "python /opt/reports/send.py"
    schedule: "@weekly"

# --- Slack integration -----------------------------------------------------
slack:
  enabled: true
  webhook_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
  channel: "#alerts"
  notify_on_success: false

# --- Email integration -----------------------------------------------------
email:
  enabled: false
  smtp_host: "smtp.example.com"
  smtp_port: 587
  username: "alerts@example.com"
  password: "s3cr3t"
  from_addr: "alerts@example.com"
  to_addrs:
    - "ops@example.com"
  notify_on_success: false

# --- Logging ---------------------------------------------------------------
logging:
  log_dir: "/var/log/cronwatch"
  level: "INFO"
