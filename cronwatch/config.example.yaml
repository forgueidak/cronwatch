# cronwatch configuration example
# Copy to config.yaml and adjust as needed.

slack:
  webhook_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
  channel: "#alerts"
  username: "cronwatch"

email:
  smtp_host: "smtp.example.com"
  smtp_port: 587
  from_addr: "cronwatch@example.com"
  to_addrs:
    - "ops@example.com"
  username: "cronwatch@example.com"
  password: "secret"

jobs:
  - name: "nightly-backup"
    command: "/usr/local/bin/backup.sh"
    schedule: "0 2 * * *"
    timeout: 3600
    notify_on_success: false
    retry:
      max_attempts: 3
      delay_seconds: 60
      backoff_factor: 2.0
      retry_on_timeout: false

  - name: "hourly-sync"
    command: "/usr/local/bin/sync.sh"
    schedule: "@hourly"
    timeout: 300
    notify_on_success: false
    retry:
      max_attempts: 2
      delay_seconds: 10
      backoff_factor: 1.0
      retry_on_timeout: true

log_dir: "/var/log/cronwatch"
history_dir: "/var/lib/cronwatch/history"
retention_days: 30
